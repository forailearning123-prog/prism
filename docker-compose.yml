services:
  backend:
    build: ./backend
    container_name: prism-backend
    restart: unless-stopped
    environment:
      - SECRET_KEY=${SECRET_KEY:?SECRET_KEY must be set — run: openssl rand -hex 32}
      - DEBUG=${DEBUG:-false}
      - ALLOWED_ORIGINS=["http://localhost", "http://localhost:80", "${FRONTEND_URL:-http://localhost}"]
      - DATABASE_URL=${DATABASE_URL:?DATABASE_URL must be set — e.g. postgresql+asyncpg://user:pass@ep-xxx.aws.neon.tech/neondb}
    volumes:
      - backend_data:/app/data
    ports:
      - "8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:8000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  frontend:
    build:
      context: ./frontend
      args:
        - VITE_API_URL=${VITE_API_URL:-}
    container_name: prism-frontend
    restart: unless-stopped
    ports:
      - "80"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  backend_data:
